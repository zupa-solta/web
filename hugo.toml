# Enter your tracking code to enable Google Analytics
[services]
  [services.googleAnalytics]
    ID = ""

[security]
  enableInlineShortcodes = true

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
  preacher = "preachers"
  series = "series"

[params]
  title = "Župe otoka Šolte"
  subtitle = "Grohote | Gornje Selo | Srednje Selo | Donje Selo | Maslinica"
  keywords = ["solta", "zupa", "crkva"]
  languageCode = "hr" 
instant_page = true
  customCSS = ["/css/schedule.css"]


  [params.author]
    name = "tkulic"
    email = "test@example.com"

  [params.favicon]
    sml = "./img/favicon/favicon-16x16.png"
    med = "./img/favicon/favicon-32x32.png"
    #lge = "example96.png"

  [params.banner]
    image = "./img/grohote_solta_sv_stjepan.jpg"

  [params.contact]
    #For netlify, please read https://www.netlify.com/docs/form-handling/
    service = "netlify" 
    confirm_page = "/kontakt-zahvala" 

  [params.footer]
    copyright = ["© Župe otoka Šolte",
