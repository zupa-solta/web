baseURL = "https://zupa-ssp.hr/"
languageCode = "hr"
title = "Župe otoka Šolte"
theme = "alpha-church"

rssLimit = 5
pagination.pagerSize = 4

enableEmoji = true

enableRobotsTXT = true

defaultContentLanguage = "hr"

[languages]
