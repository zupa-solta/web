{{ define "main" }}
<section id="main" class="container">
  <header>
    <h2>{{ i18n "weeklyHeading" }}</h2>
  </header>
  <div class="box">
    {{ $paginator := .Paginate .Pages 10 }}
    {{ range $paginator.Pages }}
    <div>
      <a href="{{ .Permalink }}">{{ .Title | markdownify }}</a>
      {{ with .Params.week_range }}<span class="date-meta"> – {{ . }}</span>{{ end }}
    </div>
    {{ end }}
    {{ template "_internal/pagination.html" $paginator }}
    <p style="margin-top:1.5em;">→ <a href="{{ "kalendar/" | relLangURL }}">{{ i18n "calendarLink" }}</a></p>
  </div>
</section>
{{ end }}
